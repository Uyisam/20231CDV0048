name: Python Build Pipeline

# 1. When should this run?
on: [push]

# 2. What should it do?
jobs:
  build:
    runs-on: ubuntu-latest  # The virtual machine type

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Pulls your code onto the VM

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Run the application
      run: python main.py
